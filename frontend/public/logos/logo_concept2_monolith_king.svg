<svg viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Circle clipping paths -->
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="45" />
    </clipPath>
    <clipPath id="left-half">
      <rect x="0" y="0" width="50" height="100" />
    </clipPath>
    <clipPath id="right-half">
      <rect x="50" y="0" width="50" height="100" />
    </clipPath>
    <!-- King Left Half -->
    <path id="king-left" d="M 50 15 L 47 15 L 47 18 L 44 18 L 44 21 L 47 21 L 47 25 L 41 27 L 35 35 L 40 40 L 36 43 L 42 48 L 34 65 L 34 72 L 28 75 L 28 80 L 24 80 L 24 85 L 50 85 Z" />
    <!-- King Right Half -->
    <path id="king-right" d="M 50 15 L 53 15 L 53 18 L 56 18 L 56 21 L 53 21 L 53 25 L 59 27 L 65 35 L 60 40 L 64 43 L 58 48 L 66 65 L 66 72 L 72 75 L 72 80 L 76 80 L 76 85 L 50 85 Z" />
  </defs>

  <!-- Symmetrical Circle split -->
  <g clip-path="url(#circle-clip)">
    <!-- Left half background: Dark Slate -->
    <rect x="0" y="0" width="50" height="100" fill="#020617" />
    <!-- Right half background: White -->
    <rect x="50" y="0" width="50" height="100" fill="#FFFFFF" />
    
    <!-- Left half King (White on Dark Slate) -->
    <use href="#king-left" fill="#FFFFFF" />
    <!-- Right half King (Dark Slate on White) -->
    <use href="#king-right" fill="#020617" />
  </g>
  
  <!-- Outer borders for the circle halves to ensure visibility -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#020617" stroke-width="4" />
  <!-- Center dividing line -->
  <line x1="50" y1="5" x2="50" y2="95" stroke="#020617" stroke-width="2" />
</svg>
